version: '2.4'

services:
  mysql:
    image: mysql:8.0
    container_name: demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: demo_db
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - demo-network
    mem_limit: 600m
    memswap_limit: 700m
    cpus: 0.6
    command: --innodb-buffer-pool-size=256M --max_connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - demo-network
    mem_limit: 150m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: demo-redisinsight
    restart: unless-stopped
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - demo-network
    mem_limit: 100m
    cpus: 0.2

  app:
    build: .
    container_name: demo-app
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW-DETAILS: always
      MANAGEMENT_METRICS_DISTRIBUTION_PERCENTILES_HTTP_SERVER_REQUESTS: 0.9,0.95,0.99
      # LOGSTASH_HOST: logstash   # ❌ BỎ ELK
      # LOGSTASH_PORT: 5000       # ❌ BỎ ELK
    depends_on:
      mysql:
        condition: service_healthy
      # logstash:                 # ❌ BỎ ELK
      #   condition: service_started
      redis:
        condition: service_healthy
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 500m
    cpus: 0.7

  prometheus:
    image: prom/prometheus:latest
    container_name: demo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=12h'
      - '--web.enable-lifecycle'
    depends_on:
      - app
      - redis-exporter
      - mysqld-exporter
      - node-exporter
      - cadvisor
    networks:
      - demo-network
    mem_limit: 300m
    cpus: 0.4

  grafana:
    image: grafana/grafana:latest
    container_name: demo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - demo-network
    mem_limit: 200m
    cpus: 0.3

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - demo-network
    mem_limit: 50m
    cpus: 0.1

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-exporter
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./exporter-my.cnf:/etc/mysql/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql/my.cnf"
    networks:
      - demo-network
    mem_limit: 100m
    cpus: 0.2

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - demo-network
    mem_limit: 50m
    cpus: 0.1

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - demo-network
    mem_limit: 100m
    cpus: 0.2

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - demo-network
    mem_limit: 100m
    cpus: 0.2

  # ================= ELK STACK (ĐÃ TẮT) =================
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
  #   container_name: elasticsearch
  #   environment:
  #     discovery.type: single-node
  #     ES_JAVA_OPTS: "-Xms256m -Xmx256m"
  #   volumes:
  #     - es_data:/usr/share/elasticsearch/data
  #   networks:
  #     - demo-network

  # kibana:
  #   image: docker.elastic.co/kibana/kibana:7.17.22
  #   container_name: kibana
  #   environment:
  #     ELASTICSEARCH_HOSTS: http://elasticsearch:9200
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - demo-network

  # logstash:
  #   image: docker.elastic.co/logstash/logstash:7.17.22
  #   container_name: logstash
  #   volumes:
  #     - ./logstash/pipeline:/usr/share/logstash/pipeline
  #   environment:
  #     LS_JAVA_OPTS: "-Xms128m -Xmx128m"
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - demo-network
  # ====================================================

  nginx:
    image: nginx:latest
    container_name: demo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
      - grafana
      # - kibana   # ❌ BỎ ELK
      - redisinsight
    networks:
      - demo-network
    mem_limit: 50m
    cpus: 0.1

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  redisinsight_data:
  es_data:

networks:
  demo-network:
    driver: bridge
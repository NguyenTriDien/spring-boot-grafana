version: '2.4'

services:
  mysql:
    image: mysql:8.0
    container_name: demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: demo_db
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - demo-network
    # Tăng lên 600MB để MySQL xử lý Query nhanh hơn khi test performance
    mem_limit: 600m
    memswap_limit: 800m
    cpus: 0.5
    # Tăng Buffer Pool để giữ data trong RAM nhiều hơn
    command: --innodb-buffer-pool-size=256M --max_connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - demo-network
    mem_limit: 100m
    cpus: 0.2

  redisinsight:
    image: redis/redisinsight:latest
    container_name: demo-redisinsight
    restart: unless-stopped
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - demo-network
    mem_limit: 150m
    cpus: 0.2

  app:
    build: .
    container_name: demo-app
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false # Tắt log SQL để đỡ tốn CPU khi test tải
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      # Cấu hình JVM tối ưu cho RAM 800MB
      JAVA_OPTS: "-Xms400m -Xmx600m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Ưu tiên RAM lớn nhất cho App để tránh Garbage Collection liên tục
    mem_limit: 800m
    cpus: 0.8

  prometheus:
    image: prom/prometheus:latest
    container_name: demo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=12h' # Giảm thời gian lưu để đỡ tốn RAM/Disk
      - '--web.enable-lifecycle'
    depends_on:
      - app
    networks:
      - demo-network
    mem_limit: 250m
    cpus: 0.3

  grafana:
    image: grafana/grafana:latest
    container_name: demo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - demo-network
    mem_limit: 200m
    cpus: 0.2

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - demo-network
    mem_limit: 50m

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-exporter
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./exporter-my.cnf:/etc/mysql/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysql/my.cnf"
    networks:
      - demo-network
    mem_limit: 50m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - demo-network
    mem_limit: 200m # Giới hạn lại vì cadvisor rất ngốn RAM
    cpus: 0.2

  nginx:
    image: nginx:latest
    container_name: demo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
      - grafana
      - redisinsight
    networks:
      - demo-network
    mem_limit: 64m
    cpus: 0.2

# --- Cụm ELK đã comment để tiết kiệm RAM ---
# elasticsearch: ... (giữ nguyên comment của bạn)
# kibana: ... (giữ nguyên comment của bạn)
# logstash: ... (giữ nguyên comment của bạn)

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  redisinsight_data:
  es_data:

networks:
  demo-network:
    driver: bridge
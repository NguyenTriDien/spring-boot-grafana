worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    sendfile on;

    upstream app {
        server app:8080;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream kibana {
        server kibana:5601;
    }

    upstream redisinsight {
        server redisinsight:5540;
    }

    include /etc/nginx/conf.d/*.conf;
}